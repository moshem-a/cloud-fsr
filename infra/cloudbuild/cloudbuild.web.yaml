# Build the SPA bundle and upload to GCS bucket fronted by Cloud CDN.
substitutions:
  _ENV: dev
  _BUCKET: gcp-sales-coach-dev-web

steps:
  - name: node:20-bookworm-slim
    id: build
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        corepack enable && corepack prepare pnpm@9.12.0 --activate
        pnpm install --frozen-lockfile --filter "@scoach/web..."
        pnpm --filter @scoach/web run build

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: upload
    waitFor: ['build']
    entrypoint: bash
    args:
      - -c
      - |
        gsutil -m -h "Cache-Control:no-cache,max-age=0" cp apps/web/dist/index.html gs://${_BUCKET}/
        gsutil -m -h "Cache-Control:public,max-age=31536000,immutable" cp -r apps/web/dist/assets gs://${_BUCKET}/assets

  # Sprint 5: invalidate Cloud CDN cache for /index.html

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
