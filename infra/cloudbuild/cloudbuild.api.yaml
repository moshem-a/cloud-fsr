# Build, push, and deploy the API container to Cloud Run.
substitutions:
  _REGION: us-central1
  _SERVICE: scoach-api-dev
  _AR_REPO: us-central1-docker.pkg.dev/${PROJECT_ID}/scoach

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_AR_REPO}/api:${SHORT_SHA}
      - -t
      - ${_AR_REPO}/api:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: ['build']
    args: ['push', '--all-tags', '${_AR_REPO}/api']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_AR_REPO}/api:${SHORT_SHA}
      - --region=${_REGION}
      - --service-account=api-runtime@${PROJECT_ID}.iam.gserviceaccount.com
      - --set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=${PROJECT_ID}
      - --concurrency=80
      - --max-instances=50
      - --timeout=3600
      - --session-affinity

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE

timeout: 1800s
