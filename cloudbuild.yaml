# Root-level Cloud Build config for the API image.
# Use: gcloud builds submit --config=cloudbuild.yaml --substitutions=_TAG=v1
substitutions:
  _TAG: latest
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/${PROJECT_ID}/scoach/api:${_TAG}
      - -t
      - us-central1-docker.pkg.dev/${PROJECT_ID}/scoach/api:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/${PROJECT_ID}/scoach/api
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
images:
  - us-central1-docker.pkg.dev/${PROJECT_ID}/scoach/api:${_TAG}
  - us-central1-docker.pkg.dev/${PROJECT_ID}/scoach/api:latest
timeout: 1200s
